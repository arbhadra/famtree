<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree — a place to remember</title>

<!-- Fonts: Lora (warm, nostalgic serif for names) + Raleway (calm sans for labels) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- html2canvas for exporting the tree as a keepsake PNG -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  /* ================================================================== */
  /*  Warm, calm, nostalgic theme — parchment + honey glow + dusty rose  */
  /* ================================================================== */
  :root {
    /* surfaces */
    --bg-1:      #f8f1e3;
    --bg-2:      #eee1c8;
    --surface:   #fffaf933;          /* glass-clay card base (set opaque below) */
    --card:      #fffaf1;
    --card-2:    #fbf2e2;

    /* ink */
    --ink:       #4b4036;            /* warm brown, AA on cream */
    --ink-soft:  #756656;
    --muted:     #9a8b76;

    /* warm accents */
    --honey:     #d99a4e;
    --honey-dk:  #b97f37;
    --honey-soft:#f7e0b8;
    --rose:      #d2868a;
    --rose-dk:   #bd6e73;
    --sage:      #a3bd9c;

    /* structure */
    --line:      #d6c4a4;
    --glow:      rgba(217,154,78,.45);
    --glow-soft: rgba(217,154,78,.22);
    --ring:      rgba(217,154,78,.65);

    --radius:    22px;
    --radius-sm: 14px;
    --card-w:    176px;

    --shadow:    0 1px 2px rgba(75,64,54,.06),
                 0 10px 22px -10px rgba(120,92,52,.28),
                 inset 0 1px 0 rgba(255,255,255,.7);
    --shadow-lift:0 2px 4px rgba(75,64,54,.08),
                 0 18px 40px -14px rgba(150,104,46,.42),
                 0 0 0 4px var(--glow-soft),
                 inset 0 1px 0 rgba(255,255,255,.8);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: "Raleway", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 700px at 18% -10%, #fff6e6 0%, transparent 55%),
      radial-gradient(1000px 800px at 110% 10%, #f6e4c6 0%, transparent 50%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    overflow: hidden;
  }

  /* soft drifting "memory" blobs in the far background */
  .ambient { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .ambient span {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: .5;
  }
  .ambient .b1 { width: 360px; height: 360px; left: -80px;  top: 12%;  background: #f6d9a8; }
  .ambient .b2 { width: 300px; height: 300px; right: -60px; top: 30%;  background: #ecc7c9; }
  .ambient .b3 { width: 420px; height: 420px; left: 30%;   bottom:-120px; background: #cfe0c6; opacity:.4; }

  @media (prefers-reduced-motion: no-preference) {
    .ambient .b1 { animation: drift 22s ease-in-out infinite; }
    .ambient .b2 { animation: drift 26s ease-in-out infinite reverse; }
    .ambient .b3 { animation: drift 30s ease-in-out infinite; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(24px,-22px) scale(1.06); }
    }
  }

  /* ================================================================== */
  /*  Top bar                                                            */
  /* ================================================================== */
  header {
    position: relative;
    z-index: 40;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;
    background: linear-gradient(180deg, rgba(255,251,243,.92), rgba(255,251,243,.74));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid #e6d8bd;
    box-shadow: 0 6px 24px -18px rgba(120,90,40,.6);
    flex-wrap: wrap;
  }
  .brand { margin-right: auto; display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand .mark {
    width: 38px; height: 38px; flex: none;
    display: grid; place-items: center;
    border-radius: 12px;
    background: radial-gradient(circle at 30% 25%, #ffe6b8, #e7b56b 55%, #d99a4e 100%);
    box-shadow: 0 6px 14px -6px var(--glow), inset 0 1px 0 rgba(255,255,255,.8);
    color: #6b4a1f;
  }
  .brand h1 {
    font-family: "Lora", serif;
    font-weight: 600;
    font-size: 21px;
    margin: 0;
    line-height: 1.05;
    letter-spacing: .2px;
  }
  .brand p {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  @media (max-width: 720px){ .brand p { display:none; } }

  .btn {
    border: 1px solid #e0cfae;
    background: linear-gradient(180deg, #fffdf8, #fbf2e2);
    color: var(--ink);
    padding: 9px 14px;
    border-radius: 12px;
    font: inherit;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
    display: inline-flex; align-items: center; gap: 7px;
    box-shadow: 0 2px 6px -3px rgba(120,90,40,.4), inset 0 1px 0 rgba(255,255,255,.7);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 18px -8px var(--glow), inset 0 1px 0 rgba(255,255,255,.8); border-color: var(--honey); }
  .btn:active { transform: translateY(0) scale(.98); }
  .btn:focus-visible { outline: 3px solid var(--ring); outline-offset: 2px; }
  .btn.primary { background: linear-gradient(180deg, #f1b863, #d99a4e); border-color: var(--honey-dk); color: #4a3210; }
  .btn.primary:hover { box-shadow: 0 10px 22px -8px var(--glow); }
  .btn.subtle { background: #fbf3e4cc; color: var(--ink-soft); }
  .btn svg { width: 16px; height: 16px; }

  .zoom {
    display: inline-flex; align-items: center;
    border: 1px solid #e0cfae; border-radius: 12px; overflow: hidden;
    background: #fffdf8;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
  }
  .zoom button { border: none; background: transparent; width: 38px; height: 38px; font-size: 19px; cursor: pointer; color: var(--ink); }
  .zoom button:hover { background: var(--honey-soft); }
  .zoom button:focus-visible { outline: 3px solid var(--ring); outline-offset: -3px; }
  .zoom .lvl { width: 52px; text-align: center; font-size: 12.5px; color: var(--muted); font-weight: 600; border-inline: 1px solid #ecdcbf; }

  /* ================================================================== */
  /*  Stage / viewport                                                  */
  /* ================================================================== */
  #viewport {
    position: absolute; inset: 64px 0 0 0;
    z-index: 10;
    overflow: auto;
    padding: 46px;
    cursor: grab;
    scrollbar-color: #d8c4a0 transparent;
  }
  #viewport.panning { cursor: grabbing; }
  #stageWrap { display: flex; justify-content: center; min-width: 100%; min-height: 100%; }
  #stage {
    position: relative;
    padding: 36px 48px 56px;
    transform-origin: top center;
    transition: transform .14s ease;
  }

  /* SVG line layer sits behind the cards */
  #wires { position: absolute; top: 0; left: 0; z-index: 0; overflow: visible; pointer-events: none; }

  /* ----- recursive layout ----- */
  .union      { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
  .couple-row { display: flex; align-items: flex-end; justify-content: center; gap: 58px; }
  .partner    { display: flex; flex-direction: column; align-items: center; }
  .ancestors  { margin-bottom: 56px; }        /* room for the connector lines */

  /* ================================================================== */
  /*  Person card                                                       */
  /* ================================================================== */
  .card {
    position: relative;
    width: var(--card-w);
    background: linear-gradient(180deg, var(--card), var(--card-2));
    border: 1px solid #ecdcc0;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px 13px 15px;
    text-align: center;
    z-index: 1;
    transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }
  .card.self  { border-color: var(--honey); box-shadow: 0 0 0 4px var(--glow-soft), var(--shadow); }
  .card.self::after {
    content: "";
    position: absolute; inset: -14px;
    border-radius: 30px;
    background: radial-gradient(closest-side, var(--glow-soft), transparent 75%);
    z-index: -1; pointer-events: none;
  }
  .card.male   { background: linear-gradient(180deg, #fbf6ef, #f3f6f4); }
  .card.female { background: linear-gradient(180deg, #fdf4f1, #fbf1ee); }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise .5s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  }

  .avatar {
    width: 88px; height: 88px; margin: 4px auto 11px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #f0e6d4);
    border: 3px solid #fff;
    box-shadow: 0 4px 12px -4px rgba(140,100,45,.5), 0 0 0 1px #e7d6b8;
    overflow: hidden; cursor: pointer; position: relative;
    display: grid; place-items: center;
    transition: box-shadow .2s ease, transform .2s ease;
  }
  .avatar:hover { box-shadow: 0 6px 16px -4px var(--glow), 0 0 0 1px var(--honey); }
  .avatar:focus-visible { outline: 3px solid var(--ring); outline-offset: 2px; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; filter: sepia(.14) saturate(.96) contrast(1.02); }
  .avatar .ph { color: #cdbda3; }
  .avatar .cam {
    position: absolute; right: 2px; bottom: 2px;
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(180deg, #f1b863, #d99a4e);
    color: #4a3210; display: grid; place-items: center;
    box-shadow: 0 2px 5px rgba(120,80,20,.45); border: 2px solid #fffaf1;
  }
  .avatar .cam svg { width: 12px; height: 12px; }

  .card input.name, .card input.rel {
    width: 100%; border: none; background: transparent; text-align: center;
    font-family: inherit; border-radius: 8px; padding: 3px 4px; color: inherit;
    transition: background .15s ease, box-shadow .15s ease;
  }
  .card input.name { font-family: "Lora", serif; font-size: 15.5px; font-weight: 600; color: var(--ink); }
  .card input.rel  { font-size: 12px; color: var(--ink-soft); font-weight: 500; margin-top: 1px; letter-spacing: .2px; }
  .card input.name::placeholder { color: #cbbca3; font-style: italic; }
  .card input.rel::placeholder  { color: #cbbca3; }
  .card input:focus { outline: none; background: #fff6e6; box-shadow: 0 0 0 2px var(--glow-soft); }

  /* action chips */
  .actions-top { display: flex; gap: 6px; justify-content: center; margin-bottom: 9px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px dashed #dcc69f; background: #fffdf8;
    color: var(--honey-dk); font-size: 11.5px; font-weight: 700;
    padding: 4px 9px; border-radius: 999px; cursor: pointer; white-space: nowrap;
    transition: all .16s ease;
  }
  .chip:hover { background: var(--honey-soft); border-color: var(--honey); color: #6b4a1f; box-shadow: 0 4px 10px -5px var(--glow); transform: translateY(-1px); }
  .chip:active { transform: scale(.96); }
  .chip:focus-visible { outline: 3px solid var(--ring); outline-offset: 2px; }
  .chip svg { width: 12px; height: 12px; }
  .chip.spouse { color: var(--rose-dk); border-color: #e6c0c2; }
  .chip.spouse:hover { background: #f9e3e4; border-color: var(--rose); color: #8a4145; }

  .del {
    position: absolute; top: -9px; right: -9px;
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid #fffaf1; background: linear-gradient(180deg,#e88f8f,#d2686d);
    color: #fff; cursor: pointer; display: none; place-items: center;
    box-shadow: 0 3px 8px -2px rgba(160,60,60,.6); z-index: 3;
  }
  .del svg { width: 12px; height: 12px; }
  .card:hover .del, .card:focus-within .del { display: grid; }
  .del:focus-visible { outline: 3px solid var(--ring); outline-offset: 2px; }

  /* ================================================================== */
  /*  Welcome / empty hint                                              */
  /* ================================================================== */
  .welcome {
    position: absolute; left: 50%; top: -2px; transform: translateX(-50%);
    width: max-content; max-width: 90vw;
    background: rgba(255,251,243,.9);
    border: 1px solid #ecdcc0; border-radius: 16px;
    padding: 10px 16px; color: var(--ink-soft);
    font-size: 13px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 8px;
  }
  .welcome b { color: var(--honey-dk); font-weight: 700; }

  /* tiny toast */
  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #4b4036; color: #fff6e6; padding: 10px 18px; border-radius: 12px;
    font-size: 13.5px; font-weight: 500; opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .25s ease; z-index: 100;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,.5);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* legend */
  .legend {
    position: fixed; right: 16px; bottom: 16px; z-index: 30;
    background: rgba(255,251,243,.86); backdrop-filter: blur(8px);
    border: 1px solid #ecdcc0; border-radius: 14px; padding: 10px 13px;
    font-size: 11.5px; color: var(--ink-soft); box-shadow: var(--shadow);
    display: grid; gap: 5px;
  }
  .legend div { display: flex; align-items: center; gap: 7px; }
  .legend .sw { width: 22px; height: 0; border-top: 2px solid var(--line); }
  .legend .ht { color: var(--rose); }
  @media (max-width: 640px){ .legend { display:none; } }
</style>
</head>
<body>

  <div class="ambient" aria-hidden="true"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>

  <header>
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <!-- tree mark -->
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22v-6"/><circle cx="12" cy="7" r="4"/><path d="M5 13a4 4 0 0 0 4 3"/><path d="M19 13a4 4 0 0 1-4 3"/>
        </svg>
      </div>
      <div>
        <h1>Family Tree</h1>
        <p>A calm place to remember the people who made you</p>
      </div>
    </div>

    <div class="zoom" role="group" aria-label="Zoom">
      <button id="zoomOut" aria-label="Zoom out">−</button>
      <div class="lvl" id="zoomLvl">100%</div>
      <button id="zoomIn" aria-label="Zoom in">+</button>
    </div>
    <button class="btn subtle" id="fitBtn">Reset view</button>
    <button class="btn primary" id="exportBtn" aria-label="Export tree as PNG image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
      Save as PNG
    </button>
    <button class="btn subtle" id="clearBtn" aria-label="Clear the whole tree">Start over</button>
  </header>

  <div id="viewport">
    <div id="stageWrap">
      <div id="stage">
        <svg id="wires" aria-hidden="true"></svg>
        <div id="tree"></div>
      </div>
    </div>
  </div>

  <div class="legend" aria-hidden="true">
    <div><span class="sw"></span> parent → child</div>
    <div><span class="ht">♥</span> married / partners</div>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

<script>
/* ====================================================================== */
/*  Family Tree — vanilla JS, single file, localStorage.                  */
/*                                                                        */
/*  DATA MODEL (bilateral, supports a spouse + their whole side)          */
/*  ---------------------------------------------------------------       */
/*  Person = { id, name, relation, gender, side, depth, photo, parents }  */
/*    - gender : 'self' | 'male' | 'female' | 'partner'                   */
/*    - side   : 'self' | 'spouse'  (which family branch this belongs to) */
/*    - depth  : generations above the root couple (0 = me / my spouse)   */
/*    - parents: a Union (the couple above this person) | null            */
/*                                                                        */
/*  Union  = { id, partners:[Person, Person?], childRef, isRoot }         */
/*    - partners : 1 or 2 people, drawn side-by-side joined by a ♥ bond   */
/*    - childRef : the person whose parents this union is (null at root)  */
/*                                                                        */
/*  The whole tree = one root Union { partners:[me, spouse?], isRoot }.   */
/*  Ancestry grows upward from each partner independently, so YOUR side   */
/*  and your SPOUSE's side are fully symmetric.                           */
/* ====================================================================== */

const STORE = 'familyTree.v2';
const SVGNS = 'http://www.w3.org/2000/svg';

const stage  = document.getElementById('stage');
const treeEl = document.getElementById('tree');
const wires  = document.getElementById('wires');
const zoomLvl= document.getElementById('zoomLvl');
const viewport = document.getElementById('viewport');

let rootUnion = null;
let scale = 1;

const uid = () => 'x' + Math.random().toString(36).slice(2, 9);

/* ---------- inline SVG icons (no emoji-as-icon) ---------- */
const ICON = {
  plus:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  heart: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.2C.4 8.6 2 5 5.4 5c2 0 3.3 1.1 4 2.2C10.3 6.1 11.6 5 13.6 5 17 5 18.6 8.6 17 11.8 14.5 16.4 12 21 12 21z"/></svg>',
  cam:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  user:  '<svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>',
  x:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>'
};

/* ---------------------------------------------------------------------- */
/*  Model helpers                                                          */
/* ---------------------------------------------------------------------- */
function makePerson(opts) {
  return Object.assign({
    id: uid(), name: '', relation: '', gender: 'self',
    side: 'self', depth: 0, photo: null, parents: null
  }, opts);
}
function makeUnion(opts) {
  return Object.assign({ id: uid(), partners: [], childRef: null, isRoot: false }, opts);
}

/* Suggest a relation label from side + gender + depth (always editable). */
function suggestRelation(side, gender, depth) {
  if (depth === 0) return side === 'self' ? 'Me' : 'Spouse';
  const base = gender === 'male' ? 'Father' : gender === 'female' ? 'Mother' : 'Parent';
  const grand = () => {                       // depth>=2 grand/great chain
    let label = 'Grand' + base.toLowerCase();
    if (depth >= 3) label = 'Great-'.repeat(depth - 2) + 'Grand' + base.toLowerCase();
    return cap(label);
  };
  if (side === 'spouse') {
    if (depth === 1) return base + '-in-law';
    return "Spouse's " + grand();
  }
  return depth === 1 ? base : grand();
}
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

/* ---------------------------------------------------------------------- */
/*  Actions                                                                */
/* ---------------------------------------------------------------------- */
// Add a father/mother above `person` (builds that person's own ancestry).
function addParent(person, gender) {
  if (!person.parents) {
    person.parents = makeUnion({ childRef: person });
  }
  const u = person.parents;
  if (u.partners.some(p => p.gender === gender)) return;     // slot already taken
  if (u.partners.length >= 2) return;
  const parent = makePerson({
    gender,
    side: person.side,
    depth: person.depth + 1,
    relation: suggestRelation(person.side, gender, person.depth + 1)
  });
  // keep fathers on the left, mothers on the right for a familiar look
  if (gender === 'male') u.partners.unshift(parent);
  else u.partners.push(parent);
  save(); render();
  toast(gender === 'male' ? 'Added a father' : 'Added a mother');
}

// Add a spouse beside `person` (fills the empty slot of their own union).
function addSpouse(person, union) {
  if (union.partners.length >= 2) return;
  const spouse = makePerson({
    gender: 'partner',
    side: 'spouse',
    depth: 0,
    relation: 'Spouse'
  });
  union.partners.push(spouse);
  save(); render();
  toast('Added your spouse — now build their side of the family too');
}

// Remove a person (and everything above them) from their union.
function removePerson(person, union) {
  if (person.gender === 'self') return;          // never remove "me"
  const ok = confirm(`Remove ${person.name || 'this person'}${person.parents ? ' and everyone above them' : ''}?`);
  if (!ok) return;
  union.partners = union.partners.filter(p => p !== person);
  // if the union is now empty and it was someone's parents, detach it
  if (union.partners.length === 0 && union.childRef) union.childRef.parents = null;
  save(); render();
  toast('Removed');
}

/* ---------------------------------------------------------------------- */
/*  Persistence                                                            */
/* ---------------------------------------------------------------------- */
function save() {
  try { localStorage.setItem(STORE, JSON.stringify(serialize(rootUnion))); }
  catch (e) { console.warn('save failed', e); }
}
// childRef is a back-pointer (cycle) — strip it on save, rebuild on load.
function serialize(u) {
  return { id: u.id, isRoot: u.isRoot, partners: u.partners.map(p => ({
    id: p.id, name: p.name, relation: p.relation, gender: p.gender,
    side: p.side, depth: p.depth, photo: p.photo,
    parents: p.parents ? serialize(p.parents) : null
  })) };
}
function deserialize(raw, childRef) {
  const u = makeUnion({ id: raw.id, isRoot: !!raw.isRoot, childRef: childRef || null });
  u.partners = (raw.partners || []).map(rp => {
    const p = makePerson({ id: rp.id, name: rp.name, relation: rp.relation,
      gender: rp.gender, side: rp.side, depth: rp.depth, photo: rp.photo });
    p.parents = rp.parents ? deserialize(rp.parents, p) : null;
    return p;
  });
  return u;
}
function load() {
  try { const raw = localStorage.getItem(STORE); if (raw) return deserialize(JSON.parse(raw)); }
  catch (e) { console.warn('load failed', e); }
  return null;
}

/* ---------------------------------------------------------------------- */
/*  Rendering                                                              */
/* ---------------------------------------------------------------------- */
function render() {
  treeEl.innerHTML = '';
  treeEl.appendChild(renderUnion(rootUnion));

  // gentle welcome hint until the tree has grown
  const me = rootUnion.partners[0];
  const bare = rootUnion.partners.length === 1 && !me.parents && !me.name;
  if (bare) {
    const w = document.createElement('div');
    w.className = 'welcome';
    w.innerHTML = 'Welcome — this card is <b>you</b>. Add your <b>parents</b> above, or your <b>spouse</b> beside you to begin.';
    stage.appendChild(w);
  }
  requestAnimationFrame(drawWires);
}

// A Union renders its partners side by side; each partner stacks its own
// ancestry above its card.
function renderUnion(union) {
  const wrap = document.createElement('div');
  wrap.className = 'union';

  const row = document.createElement('div');
  row.className = 'couple-row';

  union.partners.forEach(person => {
    const partner = document.createElement('div');
    partner.className = 'partner';

    if (person.parents) {
      const anc = document.createElement('div');
      anc.className = 'ancestors';
      anc.appendChild(renderUnion(person.parents));
      partner.appendChild(anc);
    }
    partner.appendChild(buildCard(person, union));
    row.appendChild(partner);
  });

  wrap.appendChild(row);
  return wrap;
}

function buildCard(person, union) {
  const card = document.createElement('div');
  card.className = 'card ' + (person.gender === 'self' ? 'self' : person.gender);
  card.dataset.id = person.id;

  /* --- add chips (parents above; spouse beside) --- */
  const top = document.createElement('div');
  top.className = 'actions-top';
  const hasFather = person.parents && person.parents.partners.some(p => p.gender === 'male');
  const hasMother = person.parents && person.parents.partners.some(p => p.gender === 'female');
  if (!hasFather) top.appendChild(chip('Father', ICON.plus, '', () => addParent(person, 'male')));
  if (!hasMother) top.appendChild(chip('Mother', ICON.plus, '', () => addParent(person, 'female')));
  // spouse: only where a partner slot is open in the person's OWN union
  // (this is the root couple — ancestor pairings are made via Father/Mother)
  if (union.isRoot && union.partners.length < 2 && person.gender !== 'partner') {
    top.appendChild(chip('Spouse', ICON.heart, 'spouse', () => addSpouse(person, union)));
  }
  if (top.children.length) card.appendChild(top);

  /* --- avatar / photo --- */
  const av = document.createElement('button');
  av.className = 'avatar';
  av.type = 'button';
  av.setAttribute('aria-label', 'Add or change photo');
  paintAvatar(av, person);
  const file = document.createElement('input');
  file.type = 'file'; file.accept = 'image/*'; file.hidden = true;
  file.addEventListener('change', e => onPhoto(e, person, av));
  av.addEventListener('click', () => file.click());
  card.appendChild(av);
  card.appendChild(file);

  /* --- name --- */
  const name = document.createElement('input');
  name.className = 'name'; name.value = person.name;
  name.placeholder = person.gender === 'self' ? 'Your name' : 'Name';
  name.setAttribute('aria-label', 'Name');
  name.addEventListener('input', () => { person.name = name.value; save(); });
  card.appendChild(name);

  /* --- relation --- */
  const rel = document.createElement('input');
  rel.className = 'rel'; rel.value = person.relation;
  rel.placeholder = 'Relation';
  rel.setAttribute('aria-label', 'Relationship');
  rel.addEventListener('input', () => { person.relation = rel.value; save(); });
  card.appendChild(rel);

  /* --- delete (not for "me") --- */
  if (person.gender !== 'self') {
    const del = document.createElement('button');
    del.className = 'del'; del.type = 'button';
    del.setAttribute('aria-label', 'Remove this person');
    del.innerHTML = ICON.x;
    del.addEventListener('click', () => removePerson(person, union));
    card.appendChild(del);
  }
  return card;
}

function chip(label, icon, extra, onClick) {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'chip ' + extra;
  b.innerHTML = icon + '<span>' + label + '</span>';
  b.setAttribute('aria-label', 'Add ' + label);
  b.addEventListener('click', onClick);
  return b;
}

function paintAvatar(av, person) {
  av.innerHTML = '';
  if (person.photo) {
    const img = document.createElement('img');
    img.src = person.photo;
    img.alt = person.name ? `Photo of ${person.name}` : 'Family member photo';
    av.appendChild(img);
  } else {
    const ph = document.createElement('span');
    ph.className = 'ph'; ph.innerHTML = ICON.user;
    av.appendChild(ph);
  }
  const cam = document.createElement('span');
  cam.className = 'cam'; cam.innerHTML = ICON.cam;
  av.appendChild(cam);
}

function onPhoto(e, person, av) {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => shrink(r.result, 300, url => { person.photo = url; paintAvatar(av, person); save(); });
  r.readAsDataURL(f);
}
// downscale uploaded images so localStorage stays small and exports stay crisp
function shrink(src, max, cb) {
  const img = new Image();
  img.onload = () => {
    let { width: w, height: h } = img;
    const k = Math.min(1, max / Math.max(w, h));
    w = Math.round(w * k); h = Math.round(h * k);
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(c.toDataURL('image/jpeg', 0.85));
  };
  img.onerror = () => cb(src);
  img.src = src;
}

/* ---------------------------------------------------------------------- */
/*  Connector wires (SVG, drawn behind cards)                             */
/* ---------------------------------------------------------------------- */
function drawWires() {
  while (wires.firstChild) wires.removeChild(wires.firstChild);
  const W = stage.scrollWidth, H = stage.scrollHeight;
  wires.setAttribute('width', W); wires.setAttribute('height', H);
  wires.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const sr = stage.getBoundingClientRect();
  const cardEl = id => stage.querySelector(`.card[data-id="${id}"]`);
  const pos = el => {
    const r = el.getBoundingClientRect();
    return { x: (r.left - sr.left) / scale, y: (r.top - sr.top) / scale, w: r.width / scale, h: r.height / scale };
  };

  // walk every union, collect parent→child edges and partner bonds
  const parentEdges = [], bonds = [];
  (function walk(u) {
    if (u.partners.length === 2) bonds.push([u.partners[0], u.partners[1]]);
    u.partners.forEach(p => {
      if (p.parents) {
        p.parents.partners.forEach(par => parentEdges.push([par, p])); // parent above, child below
        walk(p.parents);
      }
    });
  })(rootUnion);

  // marriage bonds: soft line + heart between the two cards
  bonds.forEach(([a, b]) => {
    const ea = cardEl(a.id), eb = cardEl(b.id); if (!ea || !eb) return;
    const pa = pos(ea), pb = pos(eb);
    const [L, R] = pa.x < pb.x ? [pa, pb] : [pb, pa];
    const y = (L.y + L.h / 2 + R.y + R.h / 2) / 2;
    const x1 = L.x + L.w, x2 = R.x;
    const mx = (x1 + x2) / 2;
    line(`M ${x1} ${y} H ${x2}`, 'bond');
    heart(mx, y);
  });

  // parent → child: drop from each parent to a shared bus, then into the child
  parentEdges.forEach(([par, child]) => {
    const ep = cardEl(par.id), ec = cardEl(child.id); if (!ep || !ec) return;
    const pp = pos(ep), pc = pos(ec);
    const px = pp.x + pp.w / 2, py = pp.y + pp.h;
    const cx = pc.x + pc.w / 2, cy = pc.y;
    const bus = cy - 28;
    line(`M ${px} ${py} V ${bus} H ${cx} V ${cy}`, 'kin');
  });

  function line(d, kind) {
    // soft glow underlay
    const glow = document.createElementNS(SVGNS, 'path');
    glow.setAttribute('d', d); glow.setAttribute('fill', 'none');
    glow.setAttribute('stroke', kind === 'bond' ? 'rgba(210,134,138,.30)' : 'rgba(217,154,78,.28)');
    glow.setAttribute('stroke-width', '6'); glow.setAttribute('stroke-linecap', 'round'); glow.setAttribute('stroke-linejoin', 'round');
    wires.appendChild(glow);
    // crisp line
    const p = document.createElementNS(SVGNS, 'path');
    p.setAttribute('d', d); p.setAttribute('fill', 'none');
    p.setAttribute('stroke', kind === 'bond' ? '#cf8f93' : '#cbb389');
    p.setAttribute('stroke-width', '2'); p.setAttribute('stroke-linecap', 'round'); p.setAttribute('stroke-linejoin', 'round');
    wires.appendChild(p);
  }
  function heart(cx, cy) {
    const s = 9;
    const d = `M ${cx} ${cy + s*0.7}
               C ${cx - s} ${cy - s*0.2}, ${cx - s*0.5} ${cy - s}, ${cx} ${cy - s*0.35}
               C ${cx + s*0.5} ${cy - s}, ${cx + s} ${cy - s*0.2}, ${cx} ${cy + s*0.7} Z`;
    const halo = document.createElementNS(SVGNS, 'circle');
    halo.setAttribute('cx', cx); halo.setAttribute('cy', cy); halo.setAttribute('r', 13);
    halo.setAttribute('fill', 'rgba(210,134,138,.16)');
    wires.appendChild(halo);
    const h = document.createElementNS(SVGNS, 'path');
    h.setAttribute('d', d); h.setAttribute('fill', '#d2868a');
    wires.appendChild(h);
  }
}

/* ---------------------------------------------------------------------- */
/*  Zoom + pan                                                             */
/* ---------------------------------------------------------------------- */
function setZoom(v) {
  scale = Math.min(1.6, Math.max(0.4, Math.round(v * 100) / 100));
  stage.style.transform = `scale(${scale})`;
  zoomLvl.textContent = Math.round(scale * 100) + '%';
}
document.getElementById('zoomIn').onclick  = () => setZoom(scale + 0.1);
document.getElementById('zoomOut').onclick = () => setZoom(scale - 0.1);
document.getElementById('fitBtn').onclick  = () => { setZoom(1); viewport.scrollTo({ left: (stage.scrollWidth - viewport.clientWidth) / 2, behavior: 'smooth' }); };

viewport.addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) { e.preventDefault(); setZoom(scale + (e.deltaY < 0 ? 0.1 : -0.1)); }
}, { passive: false });

// drag-to-pan on empty space (ignore cards / inputs / buttons)
let pan = null;
viewport.addEventListener('mousedown', e => {
  if (e.target.closest('.card, .chip, .btn, .zoom, input, button')) return;
  pan = { x: e.clientX, y: e.clientY, l: viewport.scrollLeft, t: viewport.scrollTop };
  viewport.classList.add('panning');
});
window.addEventListener('mousemove', e => {
  if (!pan) return;
  viewport.scrollLeft = pan.l - (e.clientX - pan.x);
  viewport.scrollTop  = pan.t - (e.clientY - pan.y);
});
window.addEventListener('mouseup', () => { pan = null; viewport.classList.remove('panning'); });

/* ---------------------------------------------------------------------- */
/*  Export PNG                                                             */
/* ---------------------------------------------------------------------- */
document.getElementById('exportBtn').addEventListener('click', async () => {
  const t = stage.style.transform, tr = stage.style.transition;
  const hint = stage.querySelector('.welcome'); if (hint) hint.style.display = 'none';
  stage.style.transition = 'none'; stage.style.transform = 'none';
  await new Promise(r => requestAnimationFrame(r));
  drawWires();
  await new Promise(r => requestAnimationFrame(r));
  try {
    const canvas = await html2canvas(stage, { backgroundColor: '#f6ecd9', scale: 2, useCORS: true, logging: false });
    const a = document.createElement('a');
    a.download = 'family-tree.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    toast('Saved your family tree as a picture');
  } catch (err) {
    alert('Export failed: ' + err.message);
  } finally {
    stage.style.transform = t; stage.style.transition = tr;
    if (hint) hint.style.display = '';
    requestAnimationFrame(drawWires);
  }
});

/* ---------------------------------------------------------------------- */
/*  Clear                                                                  */
/* ---------------------------------------------------------------------- */
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Start over with a blank tree? This cannot be undone.')) return;
  localStorage.removeItem(STORE);
  rootUnion = freshRoot();
  setZoom(1); save(); render();
});

/* ---------------------------------------------------------------------- */
/*  Toast                                                                  */
/* ---------------------------------------------------------------------- */
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ---------------------------------------------------------------------- */
/*  Init                                                                   */
/* ---------------------------------------------------------------------- */
function freshRoot() {
  const me = makePerson({ gender: 'self', side: 'self', depth: 0, relation: 'Me' });
  return makeUnion({ isRoot: true, partners: [me] });
}
function init() {
  rootUnion = load() || freshRoot();
  rootUnion.isRoot = true;
  setZoom(1);
  render();
  window.addEventListener('load', () => requestAnimationFrame(drawWires));
  window.addEventListener('resize', () => requestAnimationFrame(drawWires));
}
init();
</script>
</body>
</html>
